import lit.formats
import os
import subprocess

config.test_source_root = os.path.dirname(__file__)
exo_src = os.path.dirname(os.path.dirname(config.test_source_root))

llvm_prefix = subprocess.run(["brew", "--prefix", "llvm"], capture_output=True, text=True).stdout.strip()
llvm_bin = os.path.join(llvm_prefix, "bin")
assert os.path.isdir(llvm_bin), f"LLVM bin not found at {llvm_bin} - install via: brew install llvm"

config.name = "exo-mlir-e2e"
config.test_format = lit.formats.ShTest(preamble_commands=[f"cd {exo_src}"])
config.suffixes = [".py"]
config.environment["PATH"] = llvm_bin + ":" + os.environ.get("PATH", "")
